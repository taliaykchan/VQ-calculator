<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAM Plus Visual Quality Calculator (Pro)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 1000px; width: 100%; text-align: center; }
        
        /* Drag & Drop */
        #drop-zone { border: 3px dashed #27ae60; border-radius: 10px; padding: 50px; background: #e9f7ef; color: #27ae60; cursor: pointer; margin-bottom: 20px; font-weight: bold; transition: all 0.2s; }
        #drop-zone:hover, #drop-zone.dragover { background: #d4efdf; border-color: #2ecc71; }
        
        /* Progress & Status */
        #status-box { margin: 20px 0; padding: 15px; border-radius: 8px; background: #eee; font-size: 14px; position: relative; }
        #progress-container { width: 100%; background: #ddd; border-radius: 5px; height: 10px; margin-top: 10px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #27ae60; transition: width 0.1s linear; }
        
        /* Results Layout */
        .result-card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-top: 20px; text-align: left; }
        .score-display { font-size: 28px; color: #27ae60; font-weight: bold; margin: 10px 0; border-bottom: 2px solid #f4f7f6; padding-bottom: 10px; }
        
        /* Side-by-side comparison */
        .comparison-container { display: flex; flex-direction: row; gap: 20px; margin-top: 15px; width: 100%; }
        .comparison-half { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .comparison-half span { margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
        .comparison-half img, .comparison-half canvas { width: 100%; max-width: 450px; border-radius: 8px; border: 1px solid #ccc; object-fit: contain; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; }
        .color-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 8px; vertical-align: middle; }
        .weight-5 { color: #27ae60; font-weight: bold; }
        .weight-4 { color: #2980b9; font-weight: bold; }
        .weight-1 { color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>BEAM Plus Visual Quality Calculator</h1>
    <p>Using SegFormer Transformer AI for High-Precision Nature Detection</p>

    <div id="status-box">
        <span id="status-text">Initializing AI Engine (Transformers.js)...</span>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        Drag & Drop Scenery Photos or Click to Browse
        <input type="file" id="file-input" multiple hidden accept="image/*">
    </div>

    <div id="results"></div>
</div>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
    env.allowLocalModels = false;

    let segmenter;
    const statusText = document.getElementById('status-text');
    const statusBox = document.getElementById('status-box');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const dropZone = document.getElementById('drop-zone');

    function getWeight(label) {
        const l = label.toLowerCase();
        if (l.match(/tree|grass|earth|mountain|water|sea|river|lake|flower|animal|waterfall|field|land|hill|sand|rock|plant|palm|forest/)) return 5;
        if (l.match(/sky/)) return 4;
        if (l.match(/pot|vase/)) return 3;
        if (l.match(/painting|poster|screen|television/)) return 2;
        return 1; 
    }

    // Generate consistent colors based on label name
    function stringToColour(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        let colour = '#';
        for (let i = 0; i < 3; i++) {
            let value = (hash >> (i * 8)) & 0xFF;
            colour += ('00' + value.toString(16)).substr(-2);
        }
        return colour;
    }

    // Convert HEX to RGB for Canvas manipulation
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? [
            parseInt(result[1], 16),
            parseInt(result[2], 16),
            parseInt(result[3], 16)
        ] : [0, 0, 0];
    }

    async function init() {
        try {
            statusText.innerText = "Downloading AI Brain (~15MB)... Please wait.";
            progressContainer.style.display = 'block';
            
            segmenter = await pipeline('image-segmentation', 'Xenova/segformer-b0-finetuned-ade-512-512', {
                progress_callback: (x) => {
                    if (x.status === 'progress') {
                        progressBar.style.width = `${x.progress}%`;
                    }
                }
            });
            
            statusText.innerText = "AI Ready. Upload or drop images to begin analysis.";
            statusBox.style.background = "#d4efdf";
            progressContainer.style.display = 'none';
        } catch (e) {
            statusText.innerText = "Error: Could not load AI model.";
            console.error(e);
        }
    }
    init();

    // 1. Drag and Drop Implementation
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            handleFiles(e.dataTransfer.files);
        }
    });

    const fileInput = document.getElementById('file-input');
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    // 3. Batch Image Processing
    async function handleFiles(files) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = ''; 

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            statusText.innerText = `Analyzing image ${i + 1} of ${files.length}: ${file.name}...`;
            
            // Artificial loading bar effect for inference time
            progressContainer.style.display = 'block';
            progressBar.style.transition = 'width 2s ease-out';
            progressBar.style.width = '85%'; 

            const url = URL.createObjectURL(file);
            const output = await segmenter(url);
            
            progressBar.style.transition = 'width 0.2s ease-in';
            progressBar.style.width = '100%';
            
            setTimeout(() => { progressBar.style.width = '0%'; }, 300);

            processResults(file.name, url, output);
        }
        statusText.innerText = "Batch Analysis Complete.";
        progressContainer.style.display = 'none';
    }

    function processResults(name, url, output) {
        const resultsDiv = document.getElementById('results');
        const card = document.createElement('div');
        card.className = 'result-card';

        // Set up the canvas for the 4. Side-by-Side Colour Masking
        const canvas = document.createElement('canvas');
        const width = output[0].mask.width;
        const height = output[0].mask.height;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        const imgData = ctx.createImageData(width, height);

        const counts = {};
        const labelColors = {};

        // Process each mask layer
        output.forEach(maskObj => {
            const label = maskObj.label;
            const colorHex = stringToColour(label);
            const rgb = hexToRgb(colorHex);
            labelColors[label] = colorHex;
            
            let pixelCount = 0;
            
            // Loop through the flat array to apply colors to the ImageData
            for (let i = 0; i < maskObj.mask.data.length; i++) {
                if (maskObj.mask.data[i] > 0) {
                    pixelCount++;
                    const ptr = i * 4;
                    imgData.data[ptr] = rgb[0];       // R
                    imgData.data[ptr+1] = rgb[1];     // G
                    imgData.data[ptr+2] = rgb[2];     // B
                    imgData.data[ptr+3] = 180;        // Alpha (transparency overlay)
                }
            }
            counts[label] = (counts[label] || 0) + pixelCount;
        });

        // Draw the colored masks onto the canvas
        ctx.putImageData(imgData, 0, 0);

        // Calculate Scores
        let weightedSum = 0;
        let pixelSum = 0;
        let tableRows = '';

        Object.keys(counts).forEach(label => {
            const weight = getWeight(label);
            const c = counts[label];
            weightedSum += (c * weight);
            pixelSum += c;

            tableRows += `<tr>
                <td><span class="color-swatch" style="background-color: ${labelColors[label]}"></span>${label}</td>
                <td>${c.toLocaleString()}</td>
                <td class="weight-${weight}">Weight ${weight}</td>
            </tr>`;
        });

        const finalScore = pixelSum > 0 ? (weightedSum / pixelSum).toFixed(3) : 0;

        card.innerHTML = `
            <h3>${name}</h3>
            <div class="score-display">Final Weighted Score: ${finalScore} / 5.000</div>
            
            <div class="comparison-container">
                <div class="comparison-half">
                    <span>Original Photo</span>
                    <img src="${url}">
                </div>
                <div class="comparison-half">
                    <span>AI Semantic Mask</span>
                </div>
            </div>
            
            <table>
                <thead><tr><th>Detected Elements</th><th>Pixels Area</th><th>BEAM Weight</th></tr></thead>
                <tbody>${tableRows}</tbody>
            </table>
        `;

        // Append the rendered canvas directly into the right half of the comparison
        card.querySelector('.comparison-half:nth-child(2)').appendChild(canvas);
        resultsDiv.appendChild(card);
    }
</script>

</body>
</html>
