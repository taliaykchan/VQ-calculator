<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scenery & Nature Analyzer Pro (Batch Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/deeplab"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }
        h1 { margin-top: 0; color: #2c3e50; }
        
        /* Drag & Drop Zone */
        #drop-zone {
            border: 3px dashed #27ae60;
            border-radius: 10px;
            padding: 40px;
            background-color: #e9f7ef;
            color: #27ae60;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        #drop-zone.dragover {
            background-color: #d4efdf;
            border-color: #1e8449;
            transform: scale(1.02);
        }
        #drop-zone p { margin: 0; pointer-events: none; }
        .browse-text { text-decoration: underline; pointer-events: none; }

        /* Progress Bar */
        #progress-wrapper {
            width: 100%;
            background-color: #ecf0f1;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        #progress-bar {
            height: 20px;
            width: 0%;
            background-color: #27ae60;
            transition: width 0.3s ease;
        }
        #status {
            font-size: 16px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 10px;
        }

        /* Results Feed */
        #results-feed {
            display: flex;
            flex-direction: column;
            gap: 40px;
            margin-top: 30px;
            width: 100%;
        }
        .result-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: left;
        }
        .result-card h3 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
            margin-top: 10px;
        }
        .image-wrapper img, .image-wrapper canvas {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            display: block;
        }
        .image-wrapper canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.6;
            pointer-events: none;
        }
        .score-box {
            font-size: 24px;
            color: #27ae60;
            margin: 15px 0;
            padding: 10px;
            background: #e9f7ef;
            border-radius: 5px;
            display: inline-block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; }
        th { background-color: #ecf0f1; }
        .weight-5 { color: #27ae60; font-weight: bold; }
        .weight-4 { color: #2980b9; font-weight: bold; }
        .weight-3 { color: #8e44ad; font-weight: bold; }
        .weight-2 { color: #f39c12; font-weight: bold; }
        .weight-1 { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Scenery & Nature Analyzer Pro</h1>
    <p>Upload one or multiple images to calculate the weighted visual connection to nature.</p>
    
    <!-- Drag and Drop Zone -->
    <div id="drop-zone" onclick="document.getElementById('upload').click()">
        <p>Drag & Drop Images Here</p>
        <p style="font-size: 14px; color: #7f8c8d; margin-top: 5px;">or <span class="browse-text">click to browse</span></p>
    </div>
    <input type="file" id="upload" accept="image/*" multiple style="display: none;">

    <!-- Global Progress Bar -->
    <div id="status">Waking up the AI...</div>
    <div id="progress-wrapper">
        <div id="progress-bar"></div>
    </div>

    <!-- Feed for Multiple Images -->
    <div id="results-feed"></div>
</div>

<script>
    const ade20kLabels = ["background", "wall", "building", "sky", "floor", "tree", "ceiling", "road", "bed", "windowpane", "grass", "cabinet", "sidewalk", "person", "earth", "door", "table", "mountain", "plant", "curtain", "chair", "car", "water", "painting", "sofa", "shelf", "house", "sea", "mirror", "rug", "field", "armchair", "seat", "fence", "desk", "rock", "wardrobe", "lamp", "bathtub", "railing", "cushion", "base", "box", "column", "signboard", "chest of drawers", "counter", "sand", "sink", "skyscraper", "fireplace", "refrigerator", "grandstand", "path", "stairs", "runway", "case", "pool table", "pillow", "screen door", "stairway", "river", "bridge", "bookcase", "blind", "coffee table", "toilet", "flower", "book", "hill", "bench", "countertop", "stove", "palm", "kitchen island", "computer", "swivel chair", "boat", "bar", "arcade machine", "hovel", "bus", "towel", "light", "truck", "tower", "chandelier", "awning", "streetlight", "booth", "television", "airplane", "dirt track", "apparel", "pole", "land", "bannister", "escalator", "ottoman", "bottle", "buffet", "poster", "stage", "van", "ship", "fountain", "conveyer belt", "canopy", "washer", "plaything", "swimming pool", "stool", "barrel", "basket", "waterfall", "tent", "bag", "minibike", "cradle", "oven", "ball", "food", "step", "tank", "trade name", "microwave", "pot", "animal", "bicycle", "lake", "dishwasher", "screen", "blanket", "sculpture", "hood", "sconce", "vase", "traffic light", "tray", "ashcan", "fan", "pier", "crt screen", "plate", "monitor", "bulletin board", "shower", "radiator", "glass", "clock", "flag"];

    function determineWeight(label) {
        if (!label) return 1;
        const l = label.toLowerCase();
        if (l.match(/tree|grass|earth|mountain|water|sea|river|lake|flower|animal|waterfall|field|land|hill|sand|rock|dirt track|fountain|terrain/)) return 5;
        if (l.match(/sky|palm|plant|shrub|bush/)) return 4;
        if (l.match(/pot|vase/)) return 3;
        if (l.match(/painting|poster|screen|television|monitor|sculpture|crt screen|glass/)) return 2;
        return 1;
    }

    let aiModel = null;
    let isProcessing = false;

    // UI Progress Helpers
    function updateProgress(percent, text) {
        document.getElementById('progress-wrapper').style.display = 'block';
        document.getElementById('progress-bar').style.width = percent + '%';
        if (text) document.getElementById('status').innerText = text;
    }

    function hideProgress(text) {
        document.getElementById('progress-wrapper').style.display = 'none';
        if (text) document.getElementById('status').innerText = text;
    }

    // Load Model with Simulated Progress Bar
    async function loadModel() {
        let fakeProgress = 0;
        const loaderInterval = setInterval(() => {
            fakeProgress += (90 - fakeProgress) * 0.1; // Ease towards 90%
            updateProgress(fakeProgress, "Downloading AI Model... (This happens once)");
        }, 300);

        try {
            aiModel = await deeplab.load({base: 'ade20k'});
            clearInterval(loaderInterval);
            updateProgress(100, "Model loaded. Ready for images!");
            setTimeout(() => hideProgress("Awaiting images..."), 1000);
        } catch (error) {
            clearInterval(loaderInterval);
            hideProgress("Error loading model. Please refresh.");
            console.error(error);
        }
    }
    loadModel();

    // Drag and Drop Event Listeners
    const dropZone = document.getElementById('drop-zone');
    const uploadInput = document.getElementById('upload');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files), false);
    uploadInput.addEventListener('change', (e) => handleFiles(e.target.files), false);

    // Main File Handler (Batch Queue)
    async function handleFiles(files) {
        if (!aiModel) return alert("Please wait for the model to finish loading.");
        if (files.length === 0 || isProcessing) return;
        
        isProcessing = true;
        const feed = document.getElementById('results-feed');
        feed.innerHTML = ''; // Clear previous results

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const baseProgress = (i / files.length) * 100;
            const step = 100 / files.length;

            updateProgress(baseProgress + (step * 0.1), `Reading Image ${i + 1} of ${files.length}: ${file.name}`);
            
            try {
                const imgElement = await readFileAsImage(file);
                updateProgress(baseProgress + (step * 0.5), `AI Segmenting Image ${i + 1} of ${files.length}...`);
                
                const resultCard = await analyzeSingleImage(imgElement, file.name);
                feed.appendChild(resultCard);
                
                updateProgress(baseProgress + step, `Finished Image ${i + 1}`);
            } catch (err) {
                console.error(`Failed to process ${file.name}:`, err);
            }
        }

        hideProgress(`Batch Complete! Processed ${files.length} images.`);
        isProcessing = false;
        uploadInput.value = ''; // Reset input
    }

    // Promisify File Reader
    function readFileAsImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // Processing Logic for a Single Image
    async function analyzeSingleImage(imgElement, filename) {
        // 1. Auto-Downscale
        const maxDim = 800;
        let scale = Math.min(1, Math.min(maxDim / imgElement.naturalWidth, maxDim / imgElement.naturalHeight));
        const scaledWidth = Math.floor(imgElement.naturalWidth * scale);
        const scaledHeight = Math.floor(imgElement.naturalHeight * scale);
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = scaledWidth;
        tempCanvas.height = scaledHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(imgElement, 0, 0, scaledWidth, scaledHeight);

        // 2. Segment
        const prediction = await aiModel.segment(tempCanvas);
        const { segmentationMap, height, width } = prediction;

        // 3. Process Pixels
        const pixelCounts = {};
        const maskCanvas = document.createElement('canvas');
        maskCanvas.width = width;
        maskCanvas.height = height;
        const maskCtx = maskCanvas.getContext('2d');
        const imageData = maskCtx.createImageData(width, height);
        
        for (let i = 0; i < segmentationMap.length; i++) {
            const classId = segmentationMap[i];
            let labelName = ade20kLabels[classId] || 'unknown';
            
            // Heuristics for flat skies and water
            if (labelName === 'unknown' || labelName === 'background') {
                const yRatio = Math.floor(i / width) / height;
                if (yRatio < 0.50) labelName = 'sky (heuristic)';
                else if (yRatio >= 0.50 && yRatio < 0.90) labelName = 'water/terrain (heuristic)';
                else labelName = 'unrecognized structure';
            }
            
            pixelCounts[labelName] = (pixelCounts[labelName] || 0) + 1;
            const weight = determineWeight(labelName);
            const dataIndex = i * 4;

            if (dataIndex + 3 < imageData.data.length) {
                if (weight === 5) { imageData.data.set([39, 174, 96, 160], dataIndex); }      
                else if (weight === 4) { imageData.data.set([41, 128, 185, 160], dataIndex); } 
                else if (weight === 3) { imageData.data.set([142, 68, 173, 160], dataIndex); } 
                else if (weight === 2) { imageData.data.set([243, 156, 18, 160], dataIndex); } 
                else { imageData.data.set([0, 0, 0, 0], dataIndex); }                          
            }
        }
        maskCtx.putImageData(imageData, 0, 0);

        // 4. Calculate Final Score
        let totalWeightedPoints = 0;
        let tableHTML = `<table><thead><tr><th>Category / Label</th><th>Pixels Found</th><th>Weight</th></tr></thead><tbody>`;
        
        const sortedLabels = Object.keys(pixelCounts).sort((a, b) => pixelCounts[b] - pixelCounts[a]);
        sortedLabels.forEach(label => {
            const count = pixelCounts[label];
            const weight = determineWeight(label);
            totalWeightedPoints += (count * weight);
            const percentage = ((count / segmentationMap.length) * 100).toFixed(1);

            tableHTML += `<tr>
                <td>${label.charAt(0).toUpperCase() + label.slice(1)}</td>
                <td>${count.toLocaleString()} (${percentage}%)</td>
                <td class="weight-${weight}">Weight: ${weight}</td>
            </tr>`;
        });
        tableHTML += `</tbody></table>`;
        const finalScore = (totalWeightedPoints / segmentationMap.length).toFixed(3);

        // 5. Build the UI Card
        const card = document.createElement('div');
        card.className = 'result-card';
        
        // Export the mask as a data URL so it displays safely with CSS responsive sizing
        const maskDataUrl = maskCanvas.toDataURL();

        card.innerHTML = `
            <h3>${filename}</h3>
            <div class="score-box">Weighted Score: <strong>${finalScore} / 5.00</strong></div>
            <div class="image-wrapper">
                <img src="${imgElement.src}" alt="Original Image">
                <img src="${maskDataUrl}" alt="AI Mask" style="position: absolute; top:0; left:0; width:100%; height:100%; opacity:0.6; pointer-events:none;">
            </div>
            ${tableHTML}
        `;
        return card;
    }
</script>

</body>
</html>
